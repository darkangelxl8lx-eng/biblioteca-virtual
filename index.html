<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Biblioteca Virtual</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <!-- Encabezado con Navegación -->
        <header>
            <img  src="img/Paradisoft.png" alt="Logo Universidad">
            <h1>📚 Mi Biblioteca Virtual</h1>
            <nav>
                <ul>
                    <li>
                        <img src="ico/home.svg" alt="inicio-icono">
                        <a href="index.html">Inicio</a>
                    </li>
                    <li>
                        <img src="ico/account2.svg" alt="login-icono">
                        <a href="login.html">Login</a>
                    </li>
                    <li>
                        <img src="ico/book.svg" alt="catalogo-icono">
                        <a href="catalogo.html">Catálogo</a>
                    </li>
                    <li>
                        <img src="ico/card.svg" alt="contacto-icono">
                        <a href="#">Contacto</a>
                    </li>
                </ul>
            </nav>
        </header>

        <!-- Contenido Principal -->
        <main>
            <section id="bienvenida">
                <h2>Bienvenido a tu biblioteca online</h2>
                <p>Encuentra tus libros favoritos aquí.</p>
            </section>

            <section id="libros">
                <h3>Libros Destacados</h3>
                <p>Aquí se mostrarán los libros próximamente...</p>
            </section>
        </main>

        <!-- Pie de página -->
        <footer>
            <p>&copy; 2024 Biblioteca Virtual - Proyecto GitHub</p>
        </footer>

    </body>
    </html>
