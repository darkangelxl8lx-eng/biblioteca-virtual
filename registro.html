<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Biblioteca Virtual</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="login-container">
        <img src="ico/account.svg" alt="icono de cuenta">
        <h2>Crear Cuenta</h2>
        <form id="registroForm">
            <label for="regUsername" class="sr-only">Usuario</label>
            <input type="text" id="regUsername" placeholder="Usuario" required>
            <label for="regPassword" class="sr-only">Contraseña</label>
            <input type="password" id="regPassword" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
    </div>
    <script src="registro.js"></script>
</body>
</html>
